<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rayien Analytics - v11.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { jsPDF } from "https://cdn.skypack.dev/jspdf@2.5.1";
    window.jsPDF = jsPDF;
  </script>
</head>
<body class="bg-gray-100 p-4">
  <!-- LOGIN -->
  <div id="loginDiv" class="max-w-md mx-auto bg-white p-6 rounded-lg shadow mt-10">
    <h1 class="text-2xl font-bold mb-4 text-center">Rayien Analytics</h1>
    <input id="email" type="email" placeholder="Email" class="w-full p-3 border rounded mb-3">
    <input id="password" type="password" placeholder="Password" class="w-full p-3 border rounded mb-3">
    <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded font-bold">Login</button>
    <p id="error" class="text-red-500 mt-3 text-center"></p>
  </div>

  <!-- SET PASSWORD - FIRST TIME TEACHER LOGIN -->
  <div id="setPasswordDiv" style="display:none;" class="max-w-md mx-auto bg-white p-6 rounded-lg shadow mt-10">
    <h1 class="text-2xl font-bold mb-4 text-center">Set Your Password</h1>
    <p class="text-sm text-gray-600 mb-4 text-center">Welcome <span id="firstTimeEmail"></span>. Create a secure password.</p>
    <input id="newPassword" type="password" placeholder="New Password" class="w-full p-3 border rounded mb-3">
    <input id="confirmPassword" type="password" placeholder="Confirm Password" class="w-full p-3 border rounded mb-3">
    <button onclick="setFirstPassword()" class="w-full bg-green-600 text-white p-3 rounded font-bold">Set Password & Login</button>
    <p id="setPassError" class="text-red-500 mt-3 text-center"></p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashDiv" style="display:none;" class="max-w-7xl mx-auto">
    <div class="bg-white p-4 rounded-lg shadow mb-4 flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-bold">Rayien Analytics</h1>
        <p id="line2" class="text-lg text-blue-600 font-semibold"></p>
        <p id="line3" class="text-base text-gray-700"></p>
      </div>
      <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded">Logout</button>
    </div>
    <!-- SUPER ADMIN PANEL -->
    <div id="superAdminPanel" style="display:none;">
      <div class="grid grid-cols-3 gap-4 mb-4">
        <div class="bg-white p-4 rounded-lg shadow text-center">
          <h3 class="font-bold text-gray-600">Schools</h3>
          <p id="schoolCount" class="text-3xl font-bold">0</p>
        </div>
        <div class="bg-white p-4 rounded-lg shadow text-center">
          <h3 class="font-bold text-gray-600">Students</h3>
          <p id="studentCount" class="text-3xl font-bold">0</p>
        </div>
        <div class="bg-white p-4 rounded-lg shadow text-center">
          <h3 class="font-bold text-gray-600">Teachers</h3>
          <p id="teacherCount" class="text-3xl font-bold">0</p>
        </div>
      </div>
      <div class="bg-white p-6 rounded-lg shadow mb-4">
        <h3 class="text-xl font-bold mb-4">Platform Management</h3>
        <div class="mb-6 p-4 border rounded">
          <h4 class="font-bold mb-2">+ Add New School</h4>
          <input id="schoolName" placeholder="School Name" class="p-2 border rounded mr-2 mb-2 w-full md:w-auto">
          <input id="schoolEmail" placeholder="School Email" class="p-2 border rounded mr-2 mb-2 w-full md:w-auto">
          <input id="schoolPrincipal" placeholder="Principal Name" class="p-2 border rounded mr-2 mb-2 w-full md:w-auto">
          <button onclick="addSchool()" class="bg-green-600 text-white px-4 py-2 rounded">Add School</button>
        </div>
        <h4 class="font-bold mb-2">All Schools</h4>
        <div id="schoolsList" class="space-y-2"></div>
      </div>
    </div>

    <!-- ADMIN/PRINCIPAL PANEL -->
    <div id="adminPanel" style="display:none;">
      <div class="bg-white p-6 rounded-lg shadow mb-4">
        <h3 class="text-lg font-bold mb-3">School Management</h3>
        <div class="flex flex-wrap gap-2 mb-4">
          <button onclick="showAddTeacher()" class="bg-blue-600 text-white px-4 py-2 rounded">+ Add Teacher</button>
          <button onclick="showAddClass()" class="bg-blue-600 text-white px-4 py-2 rounded">+ Add Class</button>
          <button onclick="showAddStream()" class="bg-blue-600 text-white px-4 py-2 rounded">+ Add Stream</button>
          <button onclick="showAddLearningArea()" class="bg-blue-600 text-white px-4 py-2 rounded">+ Add Learning Area</button>
          <button onclick="showAddStudent()" class="bg-purple-600 text-white px-4 py-2 rounded">+ Add Learner</button>
        </div>
        <h3 class="text-lg font-bold mb-3">Assign Duties & Reports</h3>
        <div class="flex flex-wrap gap-2">
          <button onclick="showAssignClassTeacher()" class="bg-purple-600 text-white px-4 py-2 rounded">Assign Class Teacher</button>
          <button onclick="showAssignSubjectTeacher()" class="bg-purple-600 text-white px-4 py-2 rounded">Assign Subject Teacher</button>
          <button onclick="showAssignRank()" class="bg-purple-600 text-white px-4 py-2 rounded">Assign Rank/Duty</button>
          <button onclick="showGenerateReportsAdmin()" class="bg-orange-600 text-white px-4 py-2 rounded">Generate Report Cards</button>
        </div>
      </div>
      <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-lg font-bold mb-3">School Data</h3>
        <div id="adminData" class="space-y-4">Loading...</div>
      </div>
    </div>

    <!-- TEACHER PANEL -->
    <div id="teacherPanel" style="display:none;">
      <div class="bg-white p-6 rounded-lg shadow mb-4">
        <h3 class="text-lg font-bold mb-3">Teacher Actions</h3>
        <div class="flex flex-wrap gap-2">
          <button onclick="showUploadMarks()" class="bg-green-600 text-white px-4 py-2 rounded">+ Upload Marks</button>
          <button onclick="viewMyClasses()" class="bg-blue-600 text-white px-4 py-2 rounded">My Classes</button>
          <button onclick="showGenerateReports()" class="bg-purple-600 text-white px-4 py-2 rounded">Generate Reports</button>
        </div>
      </div>
      <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-lg font-bold mb-3">My Dashboard</h3>
        <div id="teacherData" class="space-y-4">Loading...</div>
      </div>
    </div>
  </div>

  <!-- UNIVERSAL MODAL -->
  <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
    <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-2xl max-h-screen overflow-y-auto">
      <h3 id="modalTitle" class="text-xl font-bold mb-4"></h3>
      <div id="modalBody"></div>
      <p id="modalError" class="text-red-500 text-sm mt-2 hidden"></p>
      <div class="flex justify-end gap-2 mt-4">
        <button onclick="closeModal()" class="px-4 py-2 border rounded">Cancel</button>
        <button id="modalSaveBtn" class="px-4 py-2 bg-blue-600 text-white rounded">Save</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, setPersistence, browserLocalPersistence, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, getDoc, setDoc, updateDoc, deleteDoc, serverTimestamp, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAuiX3gWu0GCw-9m4P-Cc3ktpnPK8AEfXw",
      authDomain: "rayien-analytics.firebaseapp.com",
      projectId: "rayien-analytics",
      storageBucket: "rayien-analytics.firebasestorage.app",
      messagingSenderId: "1021167079161",
      appId: "1:1021167079161:web:c47b3dce49b0f542045c28"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // FIX: Set persistence to avoid mobile auth/network-request-failed
    setPersistence(auth, browserLocalPersistence).catch((err) => {
      console.error("Persistence error:", err);
    });

    let currentSchoolId = null;
    let currentUserRole = null;
    let pendingTeacherEmail = null;
    let cachedTeachers = [];
    let cachedClasses = [];
    let cachedStreams = [];
    let cachedLearningAreas = [];
    let cachedStudents = [];
    let editMode = false;
    let editId = null;
    let editCollection = null;
    window.markAssignments = [];
    window.login = async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        const q = query(collection(db, "pending_teachers"), where("email", "==", email), where("tempPassword", "==", password));
        const snap = await getDocs(q);
        if (!snap.empty &&!snap.docs[0].data().activated) {
          pendingTeacherEmail = email;
          document.getElementById('loginDiv').style.display = 'none';
          document.getElementById('setPasswordDiv').style.display = 'block';
          document.getElementById('firstTimeEmail').innerText = email;
          return;
        }
        await signInWithEmailAndPassword(auth, email, password);
        document.getElementById('error').innerText = '';
      } catch (e) {
        document.getElementById('error').innerText = e.message;
      }
    };

    window.setFirstPassword = async () => {
      const newPass = document.getElementById('newPassword').value;
      const confirmPass = document.getElementById('confirmPassword').value;
      const errorEl = document.getElementById('setPassError');
      if (newPass.length < 6) { errorEl.textContent = 'Password must be 6+ characters'; return; }
      if (newPass!== confirmPass) { errorEl.textContent = 'Passwords do not match'; return; }
      try {
        const userCred = await createUserWithEmailAndPassword(auth, pendingTeacherEmail, newPass);
        const q = query(collection(db, "pending_teachers"), where("email", "==", pendingTeacherEmail));
        const snap = await getDocs(q);
        const teacherData = snap.docs[0].data();
        await setDoc(doc(db, "users", userCred.user.uid), {
          email: pendingTeacherEmail,
          role: "teacher",
          schoolId: teacherData.schoolId,
          name: teacherData.name,
          createdAt: serverTimestamp()
        });
        await updateDoc(doc(db, "pending_teachers", snap.docs[0].id), { activated: true });
        document.getElementById('setPasswordDiv').style.display = 'none';
      } catch (e) { errorEl.textContent = e.message; }
    };

    window.logout = () => signOut(auth);

    window.addSchool = async () => {
      const name = document.getElementById('schoolName').value;
      const email = document.getElementById('schoolEmail').value;
      const principal = document.getElementById('schoolPrincipal').value;
      if(!name) return alert('School name required');
      await addDoc(collection(db, "schools"), { name, email, principal, createdAt: serverTimestamp() });
      document.getElementById('schoolName').value = '';
      document.getElementById('schoolEmail').value = '';
      document.getElementById('schoolPrincipal').value = '';
      loadSchools();
    };

    async function loadSchools() {
      const querySnapshot = await getDocs(collection(db, "schools"));
      document.getElementById('schoolCount').innerText = querySnapshot.size;
      let html = '';
      querySnapshot.forEach((d) => {
        const data = d.data();
        html += `<div class="p-3 border rounded flex justify-between items-center">
          <div><b>${data.name}</b><br>Principal: ${data.principal}<br>Email: ${data.email}</div>
          <button onclick="deleteItem('schools','${d.id}')" class="bg-red-600 text-white px-3 py-1 rounded text-sm">Delete</button>
        </div>`;
      });
      document.getElementById('schoolsList').innerHTML = html || '<p class="text-gray-500">No schools yet</p>';
    }

    function openModal(title, bodyHTML, saveFn) {
      document.getElementById('modalTitle').innerText = title;
      document.getElementById('modalBody').innerHTML = bodyHTML;
      document.getElementById('modalSaveBtn').onclick = saveFn;
      document.getElementById('modalSaveBtn').innerText = editMode? 'Update' : 'Save';
      document.getElementById('modalError').classList.add('hidden');
      document.getElementById('modal').classList.remove('hidden');
    }

    window.closeModal = () => {
      document.getElementById('modal').classList.add('hidden');
      editMode = false; editId = null; editCollection = null;
    };

    function checkSchoolId() {
      if (!currentSchoolId) {
        alert('Error: Your account is not assigned to a school.');
        return false;
      }
      return true;
    }

    window.deleteItem = async (col, id, subCol = null) => {
      if (!confirm('Are you sure? This cannot be undone.')) return;
      try {
        if (subCol) {
          await deleteDoc(doc(db, "schools", currentSchoolId, col, id));
        } else {
          await deleteDoc(doc(db, col, id));
        }
        if (col === 'schools') loadSchools();
        else loadAdminData();
      } catch (e) { alert('Error: ' + e.message); }
    };

    function getOverallGrade(mean) {
      const m = Number(mean);
      if (m >= 80) return 'E.E';
      if (m >= 65) return 'M.E';
      if (m >= 50) return 'A.E';
      return 'B.E';
    }

    function getGradeFromScore(score) {
      if (score >= 80) return 'E.E';
      if (score >= 65) return 'M.E';
      if (score >= 50) return 'A.E';
      return 'B.E';
    }

    // EDIT FUNCTIONS
    window.editTeacher = async (id) => {
      if (!checkSchoolId()) return;
      const t = cachedTeachers.find(t=>t.id==id);
      editMode = true; editId = id; editCollection = 'teachers';
      openModal('Edit Teacher', `
        <input id="teacherName" placeholder="Full Name" class="w-full p-2 border rounded mb-2" value="${t.name||''}">
        <input id="teacherEmail" placeholder="Email" class="w-full p-2 border rounded mb-2" value="${t.email||''}" disabled>
        <input id="teacherPhone" placeholder="Phone" class="w-full p-2 border rounded mb-2" value="${t.phone||''}">
        <input id="teacherTSC" placeholder="TSC Number" class="w-full p-2 border rounded mb-2" value="${t.tsc||''}">
        <p class="text-xs text-gray-600">Email cannot be changed</p>
      `, saveTeacher);
    };

    window.editStudent = async (id, data) => {
      if (!checkSchoolId()) return;
      editMode = true; editId = id; editCollection = 'students';
      let streamOptions = cachedStreams.map(s => `<option value="${s.id}" ${s.id==data.streamId?'selected':''}>${cachedClasses.find(c=>c.id==s.classId)?.name||'Unknown'} ${s.name}</option>`).join('');
      openModal('Edit Learner', `
        <input id="studentName" placeholder="Full Name" class="w-full p-2 border rounded mb-2" value="${data.name||''}">
        <input id="studentAdmission" placeholder="Admission Number" class="w-full p-2 border rounded mb-2" value="${data.admission||''}">
        <input id="studentAssessment" placeholder="Assessment Number" class="w-full p-2 border rounded mb-2" value="${data.assessment||''}">
        <input id="studentUPI" placeholder="UPI Number" class="w-full p-2 border rounded mb-2" value="${data.upi||''}">
        <select id="studentStream" class="w-full p-2 border rounded mb-2">
          <option value="">Select Stream</option>
          ${streamOptions}
        </select>
        <input id="studentParent" placeholder="Parent Name" class="w-full p-2 border rounded mb-2" value="${data.parent||''}">
        <input id="studentParentPhone" placeholder="Parent Phone" class="w-full p-2 border rounded" value="${data.parentPhone||''}">
      `, saveStudent);
    };

    // ADD FUNCTIONS
    window.showAddTeacher = () => {
      if (!checkSchoolId()) return;
      const tempPass = 'temp' + Math.floor(Math.random()*10000);
      editMode = false;
      openModal('Add Teacher', `
        <input id="teacherName" placeholder="Full Name" class="w-full p-2 border rounded mb-2">
        <input id="teacherEmail" placeholder="Email - will be login" class="w-full p-2 border rounded mb-2">
        <input id="teacherPhone" placeholder="Phone" class="w-full p-2 border rounded mb-2">
        <input id="teacherTSC" placeholder="TSC Number" class="w-full p-2 border rounded mb-2">
        <input id="teacherTempPass" placeholder="Temporary Password" class="w-full p-2 border rounded" value="${tempPass}">
        <p class="text-xs text-gray-600 mt-2">Give teacher: Email + Temp Password. They'll set real password on first login.</p>
      `, saveTeacher);
    };

    window.showAddClass = () => {
      if (!checkSchoolId()) return;
      editMode = false;
      openModal('Add Class/Grade', `
        <input id="className" placeholder="Class Name e.g. Grade 5" class="w-full p-2 border rounded mb-2">
        <input id="classGrade" placeholder="Grade Level e.g. 5" class="w-full p-2 border rounded">
        <p class="text-xs text-gray-600 mt-2">Class = Grade level. Streams go under classes.</p>
      `, saveClass);
    };

    window.showAddStream = () => {
      if (!checkSchoolId()) return;
      editMode = false;
      let classOptions = cachedClasses.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      openModal('Add Stream', `
        <select id="streamClass" class="w-full p-2 border rounded mb-2">
          <option value="">Select Class/Grade</option>
          ${classOptions}
        </select>
        <input id="streamName" placeholder="Stream Name e.g. East, West, North" class="w-full p-2 border rounded mb-2">
        <p class="text-xs text-gray-600 mt-2">Stream = subdivision of a class. E.g. Grade 5 East</p>
      `, saveStream);
    };

    window.showAddLearningArea = () => {
      if (!checkSchoolId()) return;
      editMode = false;
      openModal('Add Learning Area', `
        <input id="laName" placeholder="Learning Area e.g. Mathematics" class="w-full p-2 border rounded mb-2">
        <input id="laCode" placeholder="Code e.g. MATH" class="w-full p-2 border rounded">
      `, saveLearningArea);
    };

    window.showAddStudent = () => {
      if (!checkSchoolId()) return;
      editMode = false;
      let streamOptions = cachedStreams.map(s => `<option value="${s.id}">${cachedClasses.find(c=>c.id==s.classId)?.name||'Unknown'} ${s.name}</option>`).join('');
      openModal('Add Learner', `
        <input id="studentName" placeholder="Full Name" class="w-full p-2 border rounded mb-2">
        <input id="studentAdmission" placeholder="Admission Number" class="w-full p-2 border rounded mb-2">
        <input id="studentAssessment" placeholder="Assessment Number" class="w-full p-2 border rounded mb-2">
        <input id="studentUPI" placeholder="UPI Number" class="w-full p-2 border rounded mb-2">
        <select id="studentStream" class="w-full p-2 border rounded mb-2">
          <option value="">Select Stream</option>
          ${streamOptions}
        </select>
        <input id="studentParent" placeholder="Parent Name" class="w-full p-2 border rounded mb-2">
        <input id="studentParentPhone" placeholder="Parent Phone" class="w-full p-2 border rounded">
      `, saveStudent);
    };

    // ASSIGN FUNCTIONS
    window.showAssignClassTeacher = () => {
      if (!checkSchoolId()) return;
      let teacherOptions = cachedTeachers.map(t => `<option value="${t.id}">${t.name} - ${t.email}</option>`).join('');
      let streamOptions = cachedStreams.map(s => `<option value="${s.id}">${cachedClasses.find(c=>c.id==s.classId)?.name||'Unknown'} ${s.name}</option>`).join('');
      openModal('Assign Class Teacher', `
        <select id="assignTeacher" class="w-full p-2 border rounded mb-2">
          <option value="">Select Teacher</option>
          ${teacherOptions}
        </select>
        <select id="assignStream" class="w-full p-2 border rounded mb-2">
          <option value="">Select Stream</option>
          ${streamOptions}
        </select>
        <p class="text-xs text-gray-600">Reassigning will replace previous class teacher</p>
      `, saveAssignClassTeacher);
    };

    window.showAssignSubjectTeacher = () => {
      if (!checkSchoolId()) return;
      let teacherOptions = cachedTeachers.map(t => `<option value="${t.id}">${t.name} - ${t.email}</option>`).join('');
      let streamOptions = cachedStreams.map(s => `<option value="${s.id}">${cachedClasses.find(c=>c.id==s.classId)?.name||'Unknown'} ${s.name}</option>`).join('');
      let laOptions = cachedLearningAreas.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
      openModal('Assign Subject Teacher', `
        <select id="assignSubjectTeacher" class="w-full p-2 border rounded mb-2">
          <option value="">Select Teacher</option>
          ${teacherOptions}
        </select>
        <select id="assignSubjectStream" class="w-full p-2 border rounded mb-2">
          <option value="">Select Stream</option>
          ${streamOptions}
        </select>
        <select id="assignLearningArea" class="w-full p-2 border rounded mb-2">
          <option value="">Select Learning Area</option>
          ${laOptions}
        </select>
      `, saveAssignSubjectTeacher);
    };

    window.showAssignRank = () => {
      if (!checkSchoolId()) return;
      let teacherOptions = cachedTeachers.map(t => `<option value="${t.id}">${t.name} - ${t.email}</option>`).join('');
      openModal('Assign Rank/Duty', `
        <select id="rankTeacher" class="w-full p-2 border rounded mb-2">
          <option value="">Select Teacher</option>
          ${teacherOptions}
        </select>
        <select id="rankValue" class="w-full p-2 border rounded mb-2">
          <option value="">Select Rank/Duty</option>
          <option value="Principal">Principal</option>
          <option value="Deputy Principal">Deputy Principal</option>
          <option value="Senior Teacher">Senior Teacher</option>
          <option value="HOD">Head of Department</option>
          <option value="Class Teacher">Class Teacher</option>
          <option value="Subject Teacher">Subject Teacher</option>
          <option value="Games Teacher">Games Teacher</option>
          <option value="Boarding Master">Boarding Master/Mistress</option>
        </select>
        <p class="text-xs text-gray-600">Reassigning will replace previous rank</p>
      `, saveAssignRank);
    };

    // SAVE FUNCTIONS
    async function saveTeacher() {
      const name = document.getElementById('teacherName').value;
      const email = document.getElementById('teacherEmail').value;
      const phone = document.getElementById('teacherPhone').value;
      const tsc = document.getElementById('teacherTSC').value;
      const tempPass = document.getElementById('teacherTempPass')?.value;
      const errorEl = document.getElementById('modalError');
      if(!name ||!email) { errorEl.textContent = 'Name and Email required'; errorEl.classList.remove('hidden'); return; }
      try {
        if (editMode) {
          await updateDoc(doc(db, "schools", currentSchoolId, "teachers", editId), { name, phone, tsc });
        } else {
          await addDoc(collection(db, "schools", currentSchoolId, "teachers"), { name, email, phone, tsc, createdAt: serverTimestamp() });
          await addDoc(collection(db, "pending_teachers"), { name, email, schoolId: currentSchoolId, tempPassword: tempPass, activated: false, createdAt: serverTimestamp() });
          alert(`Teacher added.\nLogin: ${email}\nTemp Password: ${tempPass}\n\nGive these to teacher.`);
        }
        closeModal(); loadAdminData();
      } catch (e) { errorEl.textContent = 'Error: ' + e.message; errorEl.classList.remove('hidden'); }
    }

    async function saveClass() {
      const name = document.getElementById('className').value;
      const grade = document.getElementById('classGrade').value;
      const errorEl = document.getElementById('modalError');
      if(!name) { errorEl.textContent = 'Class name required'; errorEl.classList.remove('hidden'); return; }
      try {
        await addDoc(collection(db, "schools", currentSchoolId, "classes"), { name, grade, createdAt: serverTimestamp() });
        closeModal(); loadAdminData();
      } catch (e) { errorEl.textContent = 'Error: ' + e.message; errorEl.classList.remove('hidden'); }
    }

    async function saveStream() {
      const classId = document.getElementById('streamClass').value;
      const name = document.getElementById('streamName').value;
      const errorEl = document.getElementById('modalError');
      if(!classId ||!name) { errorEl.textContent = 'Class and Stream name required'; errorEl.classList.remove('hidden'); return; }
      try {
        await addDoc(collection(db, "schools", currentSchoolId, "streams"), { classId, name, createdAt: serverTimestamp() });
        closeModal(); loadAdminData();
      } catch (e) { errorEl.textContent = 'Error: ' + e.message; errorEl.classList.remove('hidden'); }
    }

    async function saveLearningArea() {
      const name = document.getElementById('laName').value;
      const code = document.getElementById('laCode').value;
      const errorEl = document.getElementById('modalError');
      if(!name) { errorEl.textContent = 'Learning Area name required'; errorEl.classList.remove('hidden'); return; }
      try {

    async function saveMarksBulk() {
      const idx = document.getElementById('markAssignment').value;
      const term = document.getElementById('markTerm').value;
      const errorEl = document.getElementById('modalError');

      if (idx === '') { errorEl.textContent = 'Select class & subject'; errorEl.classList.remove('hidden'); return; }

      const assignment = window.markAssignments[idx];
      const batch = [];

      for (const s of cachedStudents) {
        const scoreVal = document.getElementById(`score_${s.id}`).value;
        if (scoreVal!== '') {
          const score = Number(scoreVal);
          if (score < 0 || score > 100) {
            errorEl.textContent = `Invalid score for ${s.name}. Use 0-100`;
            errorEl.classList.remove('hidden');
            return;
          }

          const grade = getGradeFromScore(score);

          batch.push(addDoc(collection(db, "schools", currentSchoolId, "marks"), {
            studentId: s.id,
            studentName: s.name,
            admission: s.admission,
            streamId: assignment.streamId,
            learningAreaId: assignment.learningAreaId,
            learningAreaName: assignment.learningAreaName,
            score: score,
            grade: grade,
            term: term,
            teacherId: auth.currentUser.uid,
            teacherEmail: auth.currentUser.email,
            createdAt: serverTimestamp()
          }));
        }
      }

      if (batch.length === 0) {
        errorEl.textContent = 'Enter at least one score';
        errorEl.classList.remove('hidden');
        return;
      }

      try {
        await Promise.all(batch);
        closeModal();
        alert(`${batch.length} marks uploaded successfully`);
        loadTeacherData();

        errorEl.textContent = 'Error: ' + e.message;

    async function generateReportsForStream() {
      const streamId = document.getElementById('reportStream').value;
      const term = document.getElementById('reportTerm').value;
      const errorEl = document.getElementById('modalError');

      if (!streamId) { errorEl.textContent = 'Select a stream'; errorEl.classList.remove('hidden'); return; }

      try {
        const studentsSnap = await getDocs(query(collection(db, "schools", currentSchoolId, "students"), where("streamId", "==", streamId)));
        const marksSnap = await getDocs(query(collection(db, "schools", currentSchoolId, "marks"), where("streamId", "==", streamId), where("term", "==", term)));

        const stream = cachedStreams.find(s=>s.id==streamId);
        const cls = cachedClasses.find(c=>c.id==stream.classId);
        const schoolDoc = await getDoc(doc(db, "schools", currentSchoolId));
        const schoolName = schoolDoc.data().name;

        const doc = new window.jsPDF();
        let isFirst = true;

        for (const studentDoc of studentsSnap.docs) {
          const s = studentDoc.data();
          if (!isFirst) doc.addPage();
          isFirst = false;

          const studentMarks = marksSnap.docs.filter(m => m.data().studentId == studentDoc.id).map(m=>m.data());

          doc.setFontSize(16);
          doc.text(schoolName, 105, 15, {align: 'center'});
          doc.setFontSize(12);
          doc.text(`${term} Report Card`, 105, 22, {align: 'center'});

          doc.setFontSize(10);
          doc.text(`Name: ${s.name}`, 15, 35);
          doc.text(`Adm No: ${s.admission}`, 15, 42);
          doc.text(`UPI: ${s.upi||'N/A'}`, 15, 49);
          doc.text(`Class: ${cls.name} ${stream.name}`, 110, 35);
          doc.text(`Term: ${term}`, 110, 42);

          let y = 60;
          doc.setFontSize(9);
          doc.text('Learning Area', 15, y);
          doc.text('Score', 90, y);
          doc.text('Grade', 120, y);
          doc.text('Teacher', 150, y);
          y += 5;
          doc.line(15, y, 195, y);
          y += 5;

          let total = 0;
          studentMarks.forEach(m => {
            doc.text(m.learningAreaName.substring(0,25), 15, y);
            doc.text(String(m.score), 90, y);
            doc.text(m.grade, 120, y);
            doc.text(m.teacherEmail.split('@')[0].substring(0,15), 150, y);
            total += m.score;
            y += 7;
          });

          y += 3;
          doc.line(15, y, 195, y);
          y += 7;
          const mean = studentMarks.length > 0? (total / studentMarks.length).toFixed(1) : 0;
          doc.setFontSize(11);
          doc.text(`Mean Score: ${mean}`, 15, y);
          doc.text(`Overall Grade: ${getOverallGrade(mean)}`, 110, y);

          y += 15;
          doc.setFontSize(9);
          doc.text('Class Teacher Comment: _________________________________', 15, y);
          y += 10;
          doc.text('Principal Comment: ____________________________________', 15, y);
        }

        doc.save(`${cls.name}_${stream.name}_${term}_Reports.pdf`);
        closeModal();
        alert('Report cards generated successfully');
      } catch (e) {
        errorEl.textContent = 'Error: ' + e.message;
        errorEl.classList.remove('hidden');
      }
    }

          document.getElementById('teacherPanel').style.display = 'none';
          if (currentSchoolId) {
            const schoolDoc = await getDoc(doc(db, "schools", currentSchoolId));
            if (schoolDoc.exists()) document.getElementById('line2').innerText = schoolDoc.data().name;
          }
          document.getElementById('line3').innerText = 'Admin';
          loadAdminData();
        }
      } else {
        document.getElementById('loginDiv').style.display = 'block';
        document.getElementById('dashDiv').style.display = 'none';
        document.getElementById('setPasswordDiv').style.display = 'none';
        currentSchoolId = null; currentUserRole = null;
      }
    });
  </script>
</body>
</html>
